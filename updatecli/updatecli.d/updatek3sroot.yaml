---
name: "Update k3sroot version"

sources:
  k3sroot:
    name: Get k3s-root version
    kind: githubrelease
    spec:
      owner: k3s-io
      repository: k3s-root
      token: '{{ requiredEnv .github.token }}'
      typefilter:
        release: true
        draft: false
        prerelease: false
      versionfilter:
        kind: semver
        # pattern accepts any semver constraint
        pattern: "*"

  k3sroot_sha256_amd64:
    name: Get k3s-root amd64 SHA256
    kind: shell
    dependson:
      - k3sroot
    spec:
      command: 'curl -sL "https://github.com/rancher/k3s-root/releases/download/{{ source "k3sroot" }}/sha256sum-amd64.txt" | awk ''/k3s-root-amd64.tar/{print $1; exit}'''

  k3sroot_sha256_arm64:
    name: Get k3s-root arm64 SHA256
    kind: shell
    dependson:
      - k3sroot
    spec:
      command: 'curl -sL "https://github.com/rancher/k3s-root/releases/download/{{ source "k3sroot" }}/sha256sum-arm64.txt" | awk ''/k3s-root-arm64.tar/{print $1; exit}'''

  k3sroot_sha256_arm:
    name: Get k3s-root arm SHA256
    kind: shell
    dependson:
      - k3sroot
    spec:
      command: 'curl -sL "https://github.com/rancher/k3s-root/releases/download/{{ source "k3sroot" }}/sha256sum-arm.txt" | awk ''/k3s-root-arm.tar/{print $1; exit}'''

targets:
  dockerfile:
    name: "Bump to latest k3s-root version in Dockerfile"
    kind: dockerfile
    scmid: default
    sourceid: k3sroot
    spec:
      file: "Dockerfile"
      instruction:
        keyword: "ARG"
        matcher: "K3S_ROOT_VERSION"

  dockerfile_k3sroot_sha256_amd64:
    name: "Bump k3s-root amd64 SHA256 in Dockerfile"
    kind: file
    scmid: default
    sourceid: k3sroot_sha256_amd64
    spec:
      file: "Dockerfile"
      matchpattern: '(?m)^\s*amd64\)\s+K3S_ROOT_SHA256="[a-f0-9]{64}"'
      replacepattern: '        amd64)  K3S_ROOT_SHA256="{{ source "k3sroot_sha256_amd64" }}"'

  dockerfile_k3sroot_sha256_arm64:
    name: "Bump k3s-root arm64 SHA256 in Dockerfile"
    kind: file
    scmid: default
    sourceid: k3sroot_sha256_arm64
    spec:
      file: "Dockerfile"
      matchpattern: '(?m)^\s*arm64\)\s+K3S_ROOT_SHA256="[a-f0-9]{64}"'
      replacepattern: '        arm64)  K3S_ROOT_SHA256="{{ source "k3sroot_sha256_arm64" }}"'

  dockerfile_k3sroot_sha256_arm:
    name: "Bump k3s-root arm SHA256 in Dockerfile"
    kind: file
    scmid: default
    sourceid: k3sroot_sha256_arm
    spec:
      file: "Dockerfile"
      matchpattern: '(?m)^\s*arm\)\s+K3S_ROOT_SHA256="[a-f0-9]{64}"'
      replacepattern: '        arm)    K3S_ROOT_SHA256="{{ source "k3sroot_sha256_arm" }}"'

scms:
  default:
    kind: github
    spec:
      token: '{{ requiredEnv .github.token }}'
      username: '{{ requiredEnv .github.username }}'
      user: '{{ .github.user }}'
      email: '{{ .github.email }}'
      owner: '{{ .scm.default.owner }}'
      repository: '{{ .scm.default.repository }}'
      branch: '{{ .scm.default.branch }}'
      
actions:
  default:
    title: 'Bump K3s-root version and checksums to {{ source "k3sroot" }}'
    kind: github/pullrequest
    spec:
      merge:
        strategy: auto
      labels:
        - updatecli
    scmid: default

